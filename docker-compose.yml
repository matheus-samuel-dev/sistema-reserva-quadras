services:
  postgres:
    image: postgres:16-alpine
    container_name: playspace-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playspace}
      POSTGRES_USER: ${POSTGRES_USER:-playspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playspace}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-playspace} -d ${POSTGRES_DB:-playspace}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: playspace-api
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/playspace}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-playspace}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-playspace}

      JWT_SECRET: ${JWT_SECRET:-playspace-production-change-me-secret-with-at-least-256-bits}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-720}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://reservadequadras.duckdns.org}

    ports:
      - "127.0.0.1:28080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api

    container_name: playspace-web
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "127.0.0.1:3002:80"

volumes:
  postgres-data: