spring:
  datasource:
    url: jdbc:h2:mem:playspace-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true
  jpa:
    hibernate:
      ddl-auto: validate

app:
  jwt:
    secret: playspace-test-secret-key-with-at-least-256-bits-demo
    expiration-minutes: 120
