server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: playspace-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/playspace}
    username: ${SPRING_DATASOURCE_USERNAME:playspace}
    password: ${SPRING_DATASOURCE_PASSWORD:playspace}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:playspace-demo-secret-key-with-at-least-256-bits-for-hmac}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
